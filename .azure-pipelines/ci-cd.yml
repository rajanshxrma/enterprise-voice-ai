# ci runs on every push to main AND every pr targeting main.
# the BuildAndTest stage is the review gate: set a branch policy on main
# requiring this pipeline to pass before a pr can merge
# (azure devops -> repos -> branches -> main -> branch policies -> build validation).

trigger:
  - main

pr:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'enterprise-voice-backend'
  acrName: 'auroraaudioacr'

stages:
- stage: BuildAndTest
  jobs:
  - job: BackendTests
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'
    - script: |
        cd backend
        python -m venv .venv
        source .venv/bin/activate
        pip install -r requirements.txt
        pip install pytest httpx
        pytest tests/ -v
      displayName: 'Run PyTest Unit Tests'

  - job: FrontendChecks
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'
    - script: |
        cd frontend
        npm ci
        npm run lint
        npm run build
      displayName: 'Lint and Build Frontend'

- stage: PushAndDeploy
  dependsOn: BuildAndTest
  # deploy only on real pushes to main, never on pr validation builds
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - job: DockerPush
    steps:
    - task: Docker@2
      inputs:
        containerRegistry: '$(acrName)'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: 'backend/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

  - job: KubernetesDeploy
    dependsOn: DockerPush
    steps:
    - task: KubernetesManifest@1
      inputs:
        action: 'deploy'
        connectionType: 'kubernetesServiceConnection'
        kubernetesServiceConnection: 'aks-cluster-connection'
        manifests: |
          infrastructure/k8s/azure-aks-manifest.yaml
